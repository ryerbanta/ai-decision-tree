<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Use Decision Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #16161a;
    --border: #2a2a32;
    --text: #e8e6e1;
    --muted: #d8d6d3;
    --accent-yes: #c8f04a;
    --accent-no: #ff5c5c;
    --accent-gold: #f0c040;
    --accent-neutral: #6ec6f5;
    --accent-school: #b088f9;
    --accent-work: #c8f04a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
  }

  /* Header */
  .header {
    margin-bottom: 3rem;
    text-align: left;
  }

  .header-label {
    font-size: 1rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }

  .header-title .accent {
    transition: color 0.4s;
  }

  /* Context badge shown after selection */
  .context-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.8rem;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--context-color, var(--border));
    color: var(--context-color, var(--muted));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .context-badge.visible { opacity: 1; }

  /* Progress bar */
  .progress-track {
    margin-top: 1.4rem;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--context-color, var(--accent-yes));
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1), background 0.4s;
  }

  .progress-label {
    font-size: 0.93rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2.2rem 2rem;
    position: relative;
    animation: fadeSlideIn 0.35s cubic-bezier(0.4,0,0.2,1) both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-color, var(--accent-yes));
    transition: background 0.3s;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-number {
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.45rem);
    font-weight: 700;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 1.4rem;
  }

  /* Sub-info */
  .info-block {
    background: rgba(255,255,255,0.03);
    border-left: 2px solid var(--border);
    padding: 1rem 1.2rem;
    margin-bottom: 1.8rem;
  }

  .info-block p {
    font-size: 1.125rem;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 0.3rem;
  }

  .info-block p:last-child { margin-bottom: 0; }

  .info-block .info-label {
    font-size: 0.9rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-neutral);
    margin-bottom: 0.6rem;
    display: block;
  }

  /* Checkbox list */
  .check-list {
    margin-bottom: 1.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border);
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .check-item:hover {
    border-color: var(--context-color, var(--accent-yes));
    background: rgba(200,240,74,0.04);
  }

  .check-item.selected {
    border-color: var(--context-color, var(--accent-yes));
    background: rgba(200,240,74,0.07);
  }

  .check-box {
    width: 14px;
    height: 14px;
    border: 1px solid var(--muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }

  .check-item.selected .check-box {
    background: var(--context-color, var(--accent-yes));
    border-color: var(--context-color, var(--accent-yes));
  }

  .check-item.selected .check-box::after {
    content: '';
    width: 7px;
    height: 5px;
    border-left: 1.5px solid #0e0e0f;
    border-bottom: 1.5px solid #0e0e0f;
    transform: rotate(-45deg) translateY(-1px);
    display: block;
  }

  .check-item span {
    font-size: 0.75rem;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 120px;
    padding: 0.85rem 1.2rem;
    border: 1px solid currentColor;
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.18s, color 0.18s, transform 0.12s;
  }

  .btn:active { transform: scale(0.97); }

  .btn-yes  { color: var(--accent-yes); }
  .btn-yes:hover  { background: var(--accent-yes); color: var(--bg); }

  .btn-no   { color: var(--accent-no); }
  .btn-no:hover   { background: var(--accent-no); color: #fff; }

  .btn-continue { color: var(--accent-neutral); }
  .btn-continue:hover { background: var(--accent-neutral); color: var(--bg); }

  .btn-restart {
    color: var(--muted);
    border-color: var(--border);
    font-size: 0.65rem;
  }
  .btn-restart:hover { color: var(--text); border-color: var(--muted); }

  /* Context selector */
  .context-selector {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .ctx-btn {
    flex: 1;
    min-width: 200px;
    padding: 1.6rem 1.2rem;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.12s;
    animation: fadeSlideIn 0.35s cubic-bezier(0.4,0,0.2,1) both;
    position: relative;
    overflow: hidden;
  }

  .ctx-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--ctx-accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  .ctx-btn:hover::before { transform: scaleX(1); }

  .ctx-btn:hover {
    border-color: var(--ctx-accent);
    background: rgba(255,255,255,0.03);
    transform: translateY(-2px);
  }

  .ctx-btn:active { transform: scale(0.98); }

  .ctx-icon {
    font-size: 1.8rem;
    display: block;
    margin-bottom: 0.9rem;
  }

  .ctx-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--ctx-accent);
    display: block;
    margin-bottom: 0.4rem;
  }

  .ctx-desc {
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.6;
    letter-spacing: 0.02em;
  }

  /* Outcomes */
  .outcome-stop    { --accent-color: var(--accent-no); }
  .outcome-go      { --accent-color: var(--accent-yes); }
  .outcome-warning { --accent-color: var(--accent-gold); }

  .outcome-icon  { font-size: 2rem; margin-bottom: 1rem; display: block; }

  .outcome-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 4vw, 1.8rem);
    font-weight: 900;
    margin-bottom: 0.8rem;
    line-height: 1.2;
  }

  .outcome-stop .outcome-title    { color: var(--accent-no); }
  .outcome-go .outcome-title      { color: var(--accent-yes); }
  .outcome-warning .outcome-title { color: var(--accent-gold); }

  .outcome-body {
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.75;
    margin-bottom: 1.8rem;
  }

  .watchout-list { margin-top: 0.6rem; display: flex; flex-direction: column; gap: 0.35rem; }

  .watchout-list li {
    list-style: none;
    font-size: 0.71rem;
    color: var(--muted);
    padding-left: 1.2rem;
    position: relative;
    line-height: 1.55;
  }

  .watchout-list li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--accent-gold);
  }

  /* Footer */
  .footer { margin-top: 2rem; text-align: center; }
  .footer span { font-size: 0.6rem; letter-spacing: 0.15em; color: var(--border); text-transform: uppercase; }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <p class="header-label" id="headerLabel">Decision Guide</p>
    <h1 class="header-title">Should I Use<br><span class="accent" id="accentText">AI for This?</span></h1>
    <div class="context-badge" id="contextBadge"></div>
    <div class="progress-track" id="progressTrack" style="display:none">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <p class="progress-label" id="progressLabel"></p>
  </div>

  <div id="cardContainer"></div>

  <div class="footer"><span>AI Use Decision Guide</span></div>
</div>

<script>

let currentContext = null; // 'school' | 'work'
let currentNode = null;
let selectedOptions = [];

// ─── SCHOOL nodes ─────────────────────────────────────────────────────────────

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getNodes() {
  return currentContext === 'school' ? schoolNodes : workNodes;
}

function getMeta() {
  return CONTEXT_META[currentContext];
}

function getFirstNode() {
  return currentContext === 'school' ? 'sq1' : 'wq1';
}

function getProgress(nodeKey) {
  const node = getNodes()[nodeKey];
  if (!node || !node.step) return 100;
  return Math.round(((node.step - 1) / getMeta().totalSteps) * 100);
}

function updateProgress(nodeKey) {
  const node = getNodes()[nodeKey];
  const pct = getProgress(nodeKey);
  document.getElementById('progressFill').style.width = pct + '%';
  if (node && node.step) {
    document.getElementById('progressLabel').textContent = `Step ${node.step} of ${getMeta().totalSteps}`;
  } else {
    document.getElementById('progressLabel').textContent = '';
  }
}

function setContextTheme(ctx) {
  const color = CONTEXT_META[ctx].color;
  document.documentElement.style.setProperty('--context-color', color);
  document.getElementById('accentText').style.color = color;
  document.getElementById('progressFill').style.background = color;

  const badge = document.getElementById('contextBadge');
  badge.textContent = CONTEXT_META[ctx].badge;
  badge.style.setProperty('--context-color', color);
  badge.classList.add('visible');

  document.getElementById('progressTrack').style.display = 'block';
  document.getElementById('accentText').textContent = CONTEXT_META[ctx].accentText;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderSelector() {
  currentContext = null;
  document.getElementById('accentText').textContent = 'AI for This?';
  document.getElementById('accentText').style.color = '';
  document.getElementById('contextBadge').classList.remove('visible');
  document.getElementById('progressTrack').style.display = 'none';
  document.getElementById('progressLabel').textContent = '';

  const container = document.getElementById('cardContainer');
  container.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'context-selector';
  wrap.innerHTML = `
    <button class="ctx-btn" style="--ctx-accent: var(--accent-school)" onclick="selectContext('school')">
      <span class="ctx-icon">🎓</span>
      <span class="ctx-title">School</span>
      <span class="ctx-desc">For students navigating AI use on assignments, projects, and academic work.</span>
    </button>
    <button class="ctx-btn" style="--ctx-accent: var(--accent-work)" onclick="selectContext('work')">
      <span class="ctx-icon">💼</span>
      <span class="ctx-title">Workplace</span>
      <span class="ctx-desc">For professionals navigating AI use within company policy and job responsibilities.</span>
    </button>
  `;
  container.appendChild(wrap);
}

function selectContext(ctx) {
  currentContext = ctx;
  setContextTheme(ctx);
  currentNode = getFirstNode();
  renderCard(currentNode);
}

function renderCard(nodeKey) {
  const node = getNodes()[nodeKey];
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';
  selectedOptions = [];

  const card = document.createElement('div');
  card.className = 'card';

  const total = getMeta().totalSteps;

  if (node.type === 'question') {
    card.style.setProperty('--accent-color', 'var(--context-color, var(--accent-yes))');
    card.innerHTML = `
      <p class="step-number">Question ${node.step} / ${total}</p>
      <p class="question-text">${node.text}</p>
      ${node.info ? `<div class="info-block"><span class="info-label">Consider</span><p>${node.info.replace(/·/g, '<br>·')}</p></div>` : ''}
      <div class="btn-row">
        <button class="btn btn-yes" onclick="navigate('${nodeKey}', true)">✓ Yes</button>
        <button class="btn btn-no" onclick="navigate('${nodeKey}', false)">✗ No</button>
      </div>
    `;

  } else if (node.type === 'multi') {
    card.style.setProperty('--accent-color', 'var(--accent-neutral)');
    const checkItems = node.options.map((opt, i) =>
      `<label class="check-item" id="opt${i}" onclick="toggleOption(${i}, this)">
        <span class="check-box"></span>
        <span>${opt}</span>
       </label>`
    ).join('');

    card.innerHTML = `
      <p class="step-number">Question ${node.step} / ${total}</p>
      <p class="question-text">${node.text}</p>
      ${node.info ? `<div class="info-block"><span class="info-label">Choose all that apply</span><p>${node.info}</p></div>` : ''}
      <div class="check-list">${checkItems}</div>
      <div class="btn-row">
        <button class="btn btn-continue" id="continueBtn" onclick="navigate('${nodeKey}', true)" disabled style="opacity:0.35;cursor:not-allowed">→ Continue</button>
      </div>
    `;

  } else if (node.type === 'stop') {
    card.className = 'card outcome-stop';
    card.innerHTML = `
      <span class="outcome-icon">🚫</span>
      <h2 class="outcome-title">${node.title}</h2>
      <p class="outcome-body">${node.body}</p>
      <div class="btn-row">
        <button class="btn btn-restart" onclick="restart()">↩ Change Context</button>
        <button class="btn btn-restart" onclick="restartSame()">↩ Try Again</button>
      </div>
    `;

  } else if (node.type === 'warning') {
    card.className = 'card outcome-warning';
    card.innerHTML = `
      <span class="outcome-icon">⚠️</span>
      <h2 class="outcome-title">${node.title}</h2>
      <p class="outcome-body">${node.body}</p>
      <div class="btn-row">
        <button class="btn btn-restart" onclick="restart()">↩ Change Context</button>
        <button class="btn btn-restart" onclick="restartSame()">↩ Try Again</button>
      </div>
    `;

  } else if (node.type === 'go') {
    card.className = 'card outcome-go';
    const listItems = node.watchout.map(w => `<li>${w}</li>`).join('');
    card.innerHTML = `
      <span class="outcome-icon">✅</span>
      <h2 class="outcome-title">${node.title}</h2>
      <p class="outcome-body">${node.body}</p>
      <div class="info-block">
        <span class="info-label" style="color: var(--accent-gold)">⚠ Watch Out For Harmful Uses</span>
        <ul class="watchout-list">${listItems}</ul>
      </div>
      <div class="btn-row">
        <button class="btn btn-restart" onclick="restart()">↩ Change Context</button>
        <button class="btn btn-restart" onclick="restartSame()">↩ Start Over</button>
      </div>
    `;
  }

  container.appendChild(card);
  updateProgress(nodeKey);
}

function toggleOption(index, el) {
  el.classList.toggle('selected');
  const idx = selectedOptions.indexOf(index);
  if (idx === -1) selectedOptions.push(index);
  else selectedOptions.splice(idx, 1);

  const btn = document.getElementById('continueBtn');
  if (selectedOptions.length > 0) {
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';
  } else {
    btn.disabled = true;
    btn.style.opacity = '0.35';
    btn.style.cursor = 'not-allowed';
  }
}

function navigate(nodeKey, isYes) {
  const node = getNodes()[nodeKey];
  const nextKey = node.type === 'multi' ? node.next : (isYes ? node.yes : node.no);
  currentNode = nextKey;
  renderCard(nextKey);
}

function restart() {
  renderSelector();
}

function restartSame() {
  currentNode = getFirstNode();
  renderCard(currentNode);
  document.getElementById('progressFill').style.width = '0%';
}

// Init
renderSelector();
</script>
</body>
</html>
